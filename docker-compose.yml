services:
  db:
    image: postgres:16-alpine
    container_name: insta_like_player_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-insta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-insta}
      POSTGRES_DB: ${POSTGRES_DB:-insta_like_player}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-insta}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
