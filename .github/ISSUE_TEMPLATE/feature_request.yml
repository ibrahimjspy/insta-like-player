name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The motivation or use case behind the request.
      placeholder: I want to … but currently …
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches or workarounds you've thought about.
  - type: checkboxes
    id: scope
    attributes:
      label: Scope check
      description: This project is intentionally single-user, local, and scraping-free.
      options:
        - label: This fits the project's scope (no platform scraping/login automation, only your own exported data)
          required: true
